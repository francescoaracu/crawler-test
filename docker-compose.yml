services:
  crawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crawler-test
    cpus: 3.0
    mem_limit: 4g
    volumes:
      # Persist Crawlee storages (dataset, key-value store, request queue) on host
      - ./storage:/usr/src/app/storage
    command: ["python", "-m", "crawler_test"]
